name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers only when a version tag like v1.0.0 is pushed

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: src/main.py # Pointing to the src folder where your file lives
          mode: onefile
          enable-plugins: tk-inter
          include-data-files: src/icon.ico=src/icon.ico
          disable-console: true # This replaces the 'extra-options' flag safely

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/main.exe
            build/main.bin
            build/main.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}