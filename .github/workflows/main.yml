name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # Downloads repository content safely as a ZIP archive
      - name: Download Source via API
        shell: powershell
        run: |
          $url = "https://github.com/${{ github.repository }}/archive/${{ github.ref_name }}.zip"
          Invoke-WebRequest -Uri $url -OutFile "source.zip"
          Expand-Archive -Path "source.zip" -DestinationPath "temp_extract"
          
          $nestedFolder = Get-ChildItem -Path "temp_extract" | Select-Object -First 1
          Move-Item -Path "$($nestedFolder.FullName)\*" -Destination "." -Force
          
          Remove-Item -Path "source.zip" -Force
          Remove-Item -Path "temp_extract" -Recurse -Force

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Standard pip installation for dependencies
      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # Build step using native PyInstaller configurations
      - name: Build Executable
        run: |
          pyinstaller --onefile --noconsole --add-data "src/icon.ico;src" --icon="src/icon.ico" --name="Subnautica2SaveSharer" src/main.py

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Subnautica2SaveSharer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}