name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pyinstaller
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Verify build files exist
        shell: powershell
        run: |
          $files = @("src/main.py", "src/icon.ico")
          foreach ($file in $files) {
            if (-Not (Test-Path $file)) {
              throw "Required file not found: $file"
            }
          }

      - name: Build Executable
        run: |
          pyinstaller --onefile --noconsole --add-data "src/icon.ico;src" --icon="src/icon.ico" --name="Subnautica2SaveSharer" src/main.py

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Subnautica2SaveSharer.exe
          body: "Release ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}